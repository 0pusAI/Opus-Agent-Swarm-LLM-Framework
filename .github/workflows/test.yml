name: opus-core tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    name: pytest (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opus-core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Create venv and install package
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run pytest
        run: uv run pytest -v

      - name: Run ruff
        run: uv run ruff check . || true  # advisory for now

      - name: Run mypy
        run: uv run mypy src || true  # advisory for now
