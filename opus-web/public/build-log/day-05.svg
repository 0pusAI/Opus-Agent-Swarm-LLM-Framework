<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="First Blackboard — a tablet of records with two agents on either side">
  <rect width="1080" height="1080" fill="#000"/>
  <g stroke="#787870" stroke-width="1" fill="none" opacity="0.55">
    <path d="M40 40 L40 90 M40 40 L90 40"/>
    <path d="M1040 40 L1040 90 M1040 40 L990 40"/>
    <path d="M40 1040 L40 990 M40 1040 L90 1040"/>
    <path d="M1040 1040 L1040 990 M1040 1040 L990 1040"/>
  </g>
  <!-- Two agents on either side, feeding into the tablet -->
  <g stroke="#F2EFE6" stroke-width="1.5" fill="none">
    <!-- Left agent -->
    <circle cx="180" cy="540" r="48"/>
    <circle cx="180" cy="540" r="22"/>
    <!-- Right agent -->
    <circle cx="900" cy="540" r="48"/>
    <circle cx="900" cy="540" r="22"/>
    <!-- Feed lines from agents to tablet edges -->
    <path d="M228,540 Q280,540 320,540" stroke="#D4AF7A"/>
    <path d="M852,540 Q800,540 760,540" stroke="#D4AF7A"/>
  </g>
  <!-- The tablet -->
  <g transform="translate(540,540)" stroke="#F2EFE6" stroke-width="1.6" fill="none">
    <rect x="-220" y="-260" width="440" height="520" rx="6"/>
    <!-- Inner pale frame -->
    <rect x="-200" y="-240" width="400" height="480" rx="3" stroke-width="0.8" opacity="0.5"/>
    <!-- Stacked record lines -->
    <line x1="-170" y1="-200" x2="170" y2="-200" stroke="#F2EFE6" stroke-width="1"/>
    <line x1="-170" y1="-160" x2="100" y2="-160" stroke="#F2EFE6" stroke-width="0.8" opacity="0.7"/>
    <line x1="-170" y1="-120" x2="140" y2="-120" stroke="#F2EFE6" stroke-width="0.8" opacity="0.7"/>
    <line x1="-170" y1="-80"  x2="170" y2="-80"  stroke="#D4AF7A" stroke-width="1"/>
    <line x1="-170" y1="-40"  x2="120" y2="-40"  stroke="#F2EFE6" stroke-width="0.8" opacity="0.7"/>
    <line x1="-170" y1="0"    x2="170" y2="0"    stroke="#F2EFE6" stroke-width="1"/>
    <line x1="-170" y1="40"   x2="150" y2="40"   stroke="#F2EFE6" stroke-width="0.8" opacity="0.7"/>
    <line x1="-170" y1="80"   x2="170" y2="80"   stroke="#D4AF7A" stroke-width="1"/>
    <line x1="-170" y1="120"  x2="110" y2="120"  stroke="#F2EFE6" stroke-width="0.8" opacity="0.7"/>
    <line x1="-170" y1="160"  x2="170" y2="160"  stroke="#F2EFE6" stroke-width="1"/>
    <line x1="-170" y1="200"  x2="100" y2="200"  stroke="#F2EFE6" stroke-width="0.8" opacity="0.7"/>
    <!-- Small bullet marks (record markers) -->
    <g fill="#D4AF7A" stroke="none">
      <circle cx="-188" cy="-200" r="3"/>
      <circle cx="-188" cy="-80"  r="3"/>
      <circle cx="-188" cy="0"    r="3"/>
      <circle cx="-188" cy="80"   r="3"/>
      <circle cx="-188" cy="160"  r="3"/>
    </g>
  </g>
</svg>
