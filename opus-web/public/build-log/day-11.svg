<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="Whitepaper week — a triptych of three panels: Llull's wheel, the blackboard, the termite mound">
  <rect width="1080" height="1080" fill="#000"/>
  <g stroke="#787870" stroke-width="1" fill="none" opacity="0.55">
    <path d="M40 40 L40 90 M40 40 L90 40"/>
    <path d="M1040 40 L1040 90 M1040 40 L990 40"/>
    <path d="M40 1040 L40 990 M40 1040 L90 1040"/>
    <path d="M1040 1040 L1040 990 M1040 1040 L990 1040"/>
  </g>
  <!-- Three panel frames -->
  <g stroke="#F2EFE6" stroke-width="1.4" fill="none">
    <!-- Panel 1: Llull's wheel -->
    <g transform="translate(220,540)">
      <rect x="-150" y="-280" width="300" height="560" rx="2"/>
      <g transform="translate(0,-80)">
        <circle cx="0" cy="0" r="100"/>
        <circle cx="0" cy="0" r="70" opacity="0.5" stroke-dasharray="3 4"/>
        <circle cx="0" cy="0" r="40" opacity="0.4"/>
        <line x1="0" y1="-100" x2="0" y2="100" opacity="0.4"/>
        <line x1="-100" y1="0" x2="100" y2="0" opacity="0.4"/>
        <line x1="-70" y1="-70" x2="70" y2="70" opacity="0.4"/>
        <line x1="70" y1="-70" x2="-70" y2="70" opacity="0.4"/>
        <circle cx="0" cy="-100" r="4" fill="#F2EFE6" stroke="none"/>
        <circle cx="100" cy="0" r="4" fill="#F2EFE6" stroke="none"/>
        <circle cx="0" cy="100" r="4" fill="#F2EFE6" stroke="none"/>
        <circle cx="-100" cy="0" r="4" fill="#F2EFE6" stroke="none"/>
        <circle cx="0" cy="0" r="6" fill="#D4AF7A" stroke="none"/>
      </g>
      <line x1="-110" y1="120" x2="110" y2="120" opacity="0.5" stroke-width="0.8"/>
      <line x1="-110" y1="150" x2="80" y2="150" opacity="0.5" stroke-width="0.8"/>
      <line x1="-110" y1="180" x2="110" y2="180" opacity="0.5" stroke-width="0.8"/>
      <line x1="-110" y1="210" x2="90" y2="210" opacity="0.5" stroke-width="0.8"/>
    </g>
    <!-- Panel 2: The blackboard -->
    <g transform="translate(540,540)">
      <rect x="-150" y="-280" width="300" height="560" rx="2"/>
      <g transform="translate(0,-50)">
        <rect x="-100" y="-110" width="200" height="220"/>
        <line x1="-80" y1="-80" x2="80" y2="-80" opacity="0.7"/>
        <line x1="-80" y1="-50" x2="50" y2="-50" opacity="0.6"/>
        <line x1="-80" y1="-20" x2="80" y2="-20" opacity="0.7" stroke="#D4AF7A"/>
        <line x1="-80" y1="10" x2="60" y2="10" opacity="0.6"/>
        <line x1="-80" y1="40" x2="80" y2="40" opacity="0.7"/>
        <line x1="-80" y1="70" x2="70" y2="70" opacity="0.6"/>
        <g fill="#D4AF7A" stroke="none"><circle cx="-90" cy="-20" r="2.5"/></g>
      </g>
      <line x1="-110" y1="160" x2="110" y2="160" opacity="0.5" stroke-width="0.8"/>
      <line x1="-110" y1="190" x2="90" y2="190" opacity="0.5" stroke-width="0.8"/>
      <line x1="-110" y1="220" x2="110" y2="220" opacity="0.5" stroke-width="0.8"/>
    </g>
    <!-- Panel 3: The termite mound -->
    <g transform="translate(860,540)">
      <rect x="-150" y="-280" width="300" height="560" rx="2"/>
      <g transform="translate(0,-30)">
        <!-- Mound silhouette -->
        <path d="M -100,140 Q -80,40 -60,-20 Q -40,-90 0,-130 Q 40,-90 60,-20 Q 80,40 100,140 Z"/>
        <!-- Internal galleries -->
        <g opacity="0.5">
          <path d="M -70,80 Q -30,60 30,80"/>
          <path d="M -50,40 Q 0,20 50,40"/>
          <path d="M -40,0 Q 0,-20 40,0"/>
          <path d="M -25,-50 Q 0,-70 25,-50"/>
        </g>
        <!-- A few termite dots -->
        <g fill="#F2EFE6" stroke="none">
          <circle cx="-30" cy="80" r="2.5"/>
          <circle cx="20" cy="40" r="2.5"/>
          <circle cx="-10" cy="0" r="2.5"/>
          <circle cx="15" cy="-30" r="2.5"/>
        </g>
        <!-- A single gold one in the apex -->
        <circle cx="0" cy="-100" r="4" fill="#D4AF7A" stroke="none"/>
      </g>
      <line x1="-110" y1="170" x2="110" y2="170" opacity="0.5" stroke-width="0.8"/>
      <line x1="-110" y1="200" x2="80" y2="200" opacity="0.5" stroke-width="0.8"/>
      <line x1="-110" y1="230" x2="110" y2="230" opacity="0.5" stroke-width="0.8"/>
    </g>
  </g>
</svg>
