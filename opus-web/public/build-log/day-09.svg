<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="Tests and provenance — eighteen diamond marks in a grid">
  <rect width="1080" height="1080" fill="#000"/>
  <g stroke="#787870" stroke-width="1" fill="none" opacity="0.55">
    <path d="M40 40 L40 90 M40 40 L90 40"/>
    <path d="M1040 40 L1040 90 M1040 40 L990 40"/>
    <path d="M40 1040 L40 990 M40 1040 L90 1040"/>
    <path d="M1040 1040 L1040 990 M1040 1040 L990 1040"/>
  </g>
  <!-- 18 small diamonds in a 3-row x 6-col grid — all pass -->
  <g transform="translate(540,540)">
    <!-- Background guide grid lines (very faint) -->
    <g stroke="#787870" stroke-width="0.5" opacity="0.25">
      <line x1="-360" y1="-120" x2="360" y2="-120"/>
      <line x1="-360" y1="0" x2="360" y2="0"/>
      <line x1="-360" y1="120" x2="360" y2="120"/>
    </g>
    <g stroke="#F2EFE6" stroke-width="1.5" fill="#F2EFE6">
      <g transform="translate(-300,-120) rotate(45)"><rect x="-18" y="-18" width="36" height="36"/></g>
      <g transform="translate(-180,-120) rotate(45)"><rect x="-18" y="-18" width="36" height="36"/></g>
      <g transform="translate(-60,-120) rotate(45)"><rect x="-18" y="-18" width="36" height="36"/></g>
      <g transform="translate(60,-120) rotate(45)"><rect x="-18" y="-18" width="36" height="36"/></g>
      <g transform="translate(180,-120) rotate(45)"><rect x="-18" y="-18" width="36" height="36"/></g>
      <g transform="translate(300,-120) rotate(45)"><rect x="-18" y="-18" width="36" height="36"/></g>

      <g transform="translate(-300,0) rotate(45)"><rect x="-18" y="-18" width="36" height="36"/></g>
      <g transform="translate(-180,0) rotate(45)"><rect x="-18" y="-18" width="36" height="36"/></g>
      <g transform="translate(-60,0) rotate(45)"><rect x="-18" y="-18" width="36" height="36"/></g>
      <g transform="translate(60,0) rotate(45)"><rect x="-18" y="-18" width="36" height="36"/></g>
      <g transform="translate(180,0) rotate(45)"><rect x="-18" y="-18" width="36" height="36"/></g>
      <g transform="translate(300,0) rotate(45)"><rect x="-18" y="-18" width="36" height="36"/></g>

      <g transform="translate(-300,120) rotate(45)"><rect x="-18" y="-18" width="36" height="36"/></g>
      <g transform="translate(-180,120) rotate(45)"><rect x="-18" y="-18" width="36" height="36"/></g>
      <g transform="translate(-60,120) rotate(45)"><rect x="-18" y="-18" width="36" height="36"/></g>
      <g transform="translate(60,120) rotate(45)"><rect x="-18" y="-18" width="36" height="36"/></g>
      <g transform="translate(180,120) rotate(45)"><rect x="-18" y="-18" width="36" height="36"/></g>
      <g transform="translate(300,120) rotate(45)"><rect x="-18" y="-18" width="36" height="36"/></g>
    </g>
    <!-- One gold diamond at the centre — the provenance ledger -->
    <g transform="rotate(45)" stroke="#D4AF7A" stroke-width="2.5" fill="none">
      <rect x="-90" y="-90" width="180" height="180" rx="2"/>
    </g>
    <g transform="translate(0,260)">
      <line x1="-160" y1="0" x2="160" y2="0" stroke="#D4AF7A" stroke-width="1"/>
      <circle cx="0" cy="0" r="5" fill="#D4AF7A" stroke="none"/>
    </g>
  </g>
</svg>
