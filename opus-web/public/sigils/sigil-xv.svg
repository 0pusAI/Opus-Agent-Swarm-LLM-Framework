<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="Four shipments — nav, lore, demo, contract — in four quadrants">
  <rect width="1080" height="1080" fill="#000"/>
  <g stroke="#787870" stroke-width="1" fill="none" opacity="0.55">
    <path d="M40 40 L40 90 M40 40 L90 40"/>
    <path d="M1040 40 L1040 90 M1040 40 L990 40"/>
    <path d="M40 1040 L40 990 M40 1040 L90 1040"/>
    <path d="M1040 1040 L1040 990 M1040 1040 L990 1040"/>
  </g>
  <!-- Cross dividers -->
  <g stroke="#787870" stroke-width="0.8" opacity="0.5">
    <line x1="540" y1="120" x2="540" y2="960"/>
    <line x1="120" y1="540" x2="960" y2="540"/>
  </g>
  <!-- Quadrant 1 (top-left): navigation arrows -->
  <g transform="translate(290,290)" stroke="#F2EFE6" stroke-width="1.6" fill="none">
    <line x1="-70" y1="0" x2="70" y2="0"/>
    <line x1="50" y1="-20" x2="70" y2="0"/>
    <line x1="50" y1="20" x2="70" y2="0"/>
    <line x1="-70" y1="-50" x2="40" y2="-50" opacity="0.6"/>
    <line x1="-70" y1="50" x2="40" y2="50" opacity="0.6"/>
    <circle cx="-90" cy="0" r="6" fill="#D4AF7A" stroke="none"/>
    <circle cx="-90" cy="-50" r="3" fill="#F2EFE6" stroke="none" opacity="0.6"/>
    <circle cx="-90" cy="50" r="3" fill="#F2EFE6" stroke="none" opacity="0.6"/>
  </g>
  <!-- Quadrant 2 (top-right): lore — a small silhouette frame -->
  <g transform="translate(790,290)" stroke="#F2EFE6" stroke-width="1.5" fill="none">
    <rect x="-80" y="-90" width="160" height="180"/>
    <!-- Small silhouette inside (just a sphere head + shoulders) -->
    <circle cx="0" cy="-20" r="22"/>
    <path d="M -40,70 Q -40,30 0,30 Q 40,30 40,70 Z" />
    <!-- Inscription dots beneath -->
    <circle cx="-30" cy="65" r="2" fill="#F2EFE6" stroke="none"/>
    <circle cx="-15" cy="65" r="2" fill="#F2EFE6" stroke="none"/>
    <circle cx="0" cy="65" r="2.5" fill="#D4AF7A" stroke="none"/>
    <circle cx="15" cy="65" r="2" fill="#F2EFE6" stroke="none"/>
    <circle cx="30" cy="65" r="2" fill="#F2EFE6" stroke="none"/>
  </g>
  <!-- Quadrant 3 (bottom-left): the swarm — Hive + workers -->
  <g transform="translate(290,790)" stroke="#F2EFE6" stroke-width="1.4" fill="none">
    <!-- Central Hive -->
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" stroke="#D4AF7A" stroke-width="2"/>
    <circle cx="0" cy="0" r="9" fill="#D4AF7A" stroke="none"/>
    <!-- Workers around -->
    <circle cx="0" cy="-80" r="9"/>
    <circle cx="69" cy="-40" r="9"/>
    <circle cx="69" cy="40" r="9"/>
    <circle cx="0" cy="80" r="9"/>
    <circle cx="-69" cy="40" r="9"/>
    <circle cx="-69" cy="-40" r="9"/>
    <!-- Connection lines -->
    <g opacity="0.5">
      <line x1="0" y1="-30" x2="0" y2="-70"/>
      <line x1="22" y1="-15" x2="60" y2="-35"/>
      <line x1="22" y1="15" x2="60" y2="35"/>
      <line x1="0" y1="30" x2="0" y2="70"/>
      <line x1="-22" y1="15" x2="-60" y2="35"/>
      <line x1="-22" y1="-15" x2="-60" y2="-35"/>
    </g>
  </g>
  <!-- Quadrant 4 (bottom-right): contract — sealed diamond + ledger marks -->
  <g transform="translate(790,790)" stroke="#F2EFE6" stroke-width="1.6" fill="none">
    <!-- Diamond seal -->
    <g transform="rotate(45)">
      <rect x="-55" y="-55" width="110" height="110" stroke="#D4AF7A" stroke-width="2"/>
      <rect x="-30" y="-30" width="60" height="60" fill="#D4AF7A" stroke="none"/>
    </g>
    <!-- Address-like marks beneath -->
    <line x1="-80" y1="80" x2="80" y2="80" opacity="0.5" stroke-width="0.8"/>
    <g fill="#F2EFE6" stroke="none" opacity="0.7">
      <rect x="-78" y="86" width="14" height="4"/>
      <rect x="-60" y="86" width="20" height="4"/>
      <rect x="-36" y="86" width="14" height="4"/>
      <rect x="-18" y="86" width="22" height="4"/>
      <rect x="8" y="86" width="18" height="4"/>
      <rect x="30" y="86" width="14" height="4"/>
      <rect x="48" y="86" width="20" height="4"/>
    </g>
  </g>
  <!-- Tiny central crosshair -->
  <g stroke="#D4AF7A" stroke-width="1" opacity="0.7">
    <line x1="535" y1="540" x2="545" y2="540"/>
    <line x1="540" y1="535" x2="540" y2="545"/>
  </g>
</svg>
