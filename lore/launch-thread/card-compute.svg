<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" role="img" aria-label="OPUS Compute card — compute, conviction, access">
  <rect width="1080" height="1080" fill="#000"/>

  <!-- Corner brackets -->
  <g stroke="#787870" stroke-width="1.2" fill="none" opacity="0.6">
    <path d="M40 40 L40 100 M40 40 L100 40"/>
    <path d="M1040 40 L1040 100 M1040 40 L980 40"/>
    <path d="M40 1040 L40 980 M40 1040 L100 1040"/>
    <path d="M1040 1040 L1040 980 M1040 1040 L980 1040"/>
  </g>

  <!-- ── Eyebrow ─────────────────────────────────────── -->
  <text x="540" y="135" text-anchor="middle"
        font-family="'JetBrains Mono','Courier New',monospace"
        font-size="26" letter-spacing="7"
        fill="#D4AF7A">§ COMPUTE &#183; MMXXVI</text>

  <g>
    <line x1="430" y1="170" x2="520" y2="170" stroke="#D4AF7A" stroke-width="0.6" opacity="0.55"/>
    <circle cx="540" cy="170" r="2.6" fill="#D4AF7A"/>
    <line x1="560" y1="170" x2="650" y2="170" stroke="#D4AF7A" stroke-width="0.6" opacity="0.55"/>
  </g>

  <!-- ── The sigil: sphere + compute ring + key ──────── -->
  <g transform="translate(540, 470)">

    <!-- Outer guide ring (very faint) -->
    <circle cx="0" cy="0" r="330" stroke="#787870" stroke-width="0.6" fill="none" opacity="0.25" stroke-dasharray="2 8"/>

    <!-- 12 compute cells around the sphere — alternating filled/outlined -->
    <!-- Filled = funded; outlined = the locked layers the beta unlocks -->
    <g>
      <!-- 12 cells at angles 0°, 30°, 60° ... 330° (radius 280) -->
      <!-- Position formula: x = 280*cos(theta), y = -280*sin(theta) -->
      <!-- 12 o'clock through clockwise -->

      <!-- 12 o'clock (top): filled -->
      <g transform="translate(0,-280)"><rect x="-12" y="-12" width="24" height="24" transform="rotate(45)" fill="#D4AF7A"/></g>
      <!-- 1 o'clock -->
      <g transform="translate(140,-242)"><rect x="-12" y="-12" width="24" height="24" transform="rotate(45)" fill="#D4AF7A"/></g>
      <!-- 2 o'clock -->
      <g transform="translate(242,-140)"><rect x="-12" y="-12" width="24" height="24" transform="rotate(45)" fill="#D4AF7A"/></g>
      <!-- 3 o'clock: outlined (locked layer) -->
      <g transform="translate(280,0)"><rect x="-12" y="-12" width="24" height="24" transform="rotate(45)" fill="none" stroke="#D4AF7A" stroke-width="1.4"/></g>
      <!-- 4 o'clock -->
      <g transform="translate(242,140)"><rect x="-12" y="-12" width="24" height="24" transform="rotate(45)" fill="#D4AF7A"/></g>
      <!-- 5 o'clock -->
      <g transform="translate(140,242)"><rect x="-12" y="-12" width="24" height="24" transform="rotate(45)" fill="#D4AF7A"/></g>
      <!-- 6 o'clock: outlined (locked layer) -->
      <g transform="translate(0,280)"><rect x="-12" y="-12" width="24" height="24" transform="rotate(45)" fill="none" stroke="#D4AF7A" stroke-width="1.4"/></g>
      <!-- 7 o'clock -->
      <g transform="translate(-140,242)"><rect x="-12" y="-12" width="24" height="24" transform="rotate(45)" fill="#D4AF7A"/></g>
      <!-- 8 o'clock -->
      <g transform="translate(-242,140)"><rect x="-12" y="-12" width="24" height="24" transform="rotate(45)" fill="#D4AF7A"/></g>
      <!-- 9 o'clock: outlined (locked layer) -->
      <g transform="translate(-280,0)"><rect x="-12" y="-12" width="24" height="24" transform="rotate(45)" fill="none" stroke="#D4AF7A" stroke-width="1.4"/></g>
      <!-- 10 o'clock -->
      <g transform="translate(-242,-140)"><rect x="-12" y="-12" width="24" height="24" transform="rotate(45)" fill="#D4AF7A"/></g>
      <!-- 11 o'clock -->
      <g transform="translate(-140,-242)"><rect x="-12" y="-12" width="24" height="24" transform="rotate(45)" fill="#D4AF7A"/></g>
    </g>

    <!-- Faint chord lines from each cell to the centre -->
    <g stroke="#D4AF7A" stroke-width="0.4" opacity="0.25" fill="none">
      <line x1="0" y1="-280" x2="0" y2="0"/>
      <line x1="140" y1="-242" x2="0" y2="0"/>
      <line x1="242" y1="-140" x2="0" y2="0"/>
      <line x1="280" y1="0" x2="0" y2="0"/>
      <line x1="242" y1="140" x2="0" y2="0"/>
      <line x1="140" y1="242" x2="0" y2="0"/>
      <line x1="0" y1="280" x2="0" y2="0"/>
      <line x1="-140" y1="242" x2="0" y2="0"/>
      <line x1="-242" y1="140" x2="0" y2="0"/>
      <line x1="-280" y1="0" x2="0" y2="0"/>
      <line x1="-242" y1="-140" x2="0" y2="0"/>
      <line x1="-140" y1="-242" x2="0" y2="0"/>
    </g>

    <!-- Central armillary sphere -->
    <g stroke="#F2EFE6" stroke-width="1.5" fill="none">
      <circle r="135"/>
      <ellipse rx="135" ry="45" stroke-width="1"/>
      <ellipse rx="45" ry="135" stroke-width="1"/>
      <ellipse rx="95" ry="95" stroke-width="0.6" opacity="0.4"/>
    </g>
    <g fill="#F2EFE6">
      <circle cx="135" cy="0" r="3.5"/>
      <circle cx="-135" cy="0" r="3.5"/>
    </g>
    <!-- Central ember -->
    <circle r="26" stroke="#D4AF7A" stroke-width="1.1" fill="none"/>
    <circle r="14" stroke="#D4AF7A" stroke-width="0.7" fill="none" opacity="0.6"/>
    <circle r="9" fill="#D4AF7A"/>
    <!-- Top finial -->
    <line x1="0" y1="-135" x2="0" y2="-158" stroke="#F2EFE6" stroke-width="1.1"/>
    <circle cx="0" cy="-164" r="4.5" fill="#F2EFE6"/>
  </g>

  <!-- ── The Key beneath ──────────────────────────────── -->
  <g transform="translate(540, 830)">
    <!-- Key head (circle with inner ring) -->
    <circle cx="0" cy="-22" r="20" stroke="#D4AF7A" stroke-width="2" fill="none"/>
    <circle cx="0" cy="-22" r="9" stroke="#D4AF7A" stroke-width="1.2" fill="none"/>
    <!-- Key shaft -->
    <line x1="0" y1="-2" x2="0" y2="38" stroke="#D4AF7A" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Key teeth -->
    <line x1="0" y1="24" x2="13" y2="24" stroke="#D4AF7A" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="0" y1="34" x2="9"  y2="34" stroke="#D4AF7A" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <!-- ── Bottom ornament ─────────────────────────────── -->
  <g>
    <line x1="430" y1="900" x2="520" y2="900" stroke="#D4AF7A" stroke-width="0.6" opacity="0.55"/>
    <circle cx="540" cy="900" r="2.6" fill="#D4AF7A"/>
    <line x1="560" y1="900" x2="650" y2="900" stroke="#D4AF7A" stroke-width="0.6" opacity="0.55"/>
  </g>

  <!-- ── Title ───────────────────────────────────────── -->
  <text x="540" y="965" text-anchor="middle"
        font-family="Cinzel,'Trajan Pro','Times New Roman',serif"
        font-size="46" letter-spacing="5"
        fill="#F2EFE6">COMPUTE &#183; CONVICTION &#183; ACCESS</text>

  <!-- ── Footer ──────────────────────────────────────── -->
  <text x="540" y="1020" text-anchor="middle"
        font-family="'JetBrains Mono','Courier New',monospace"
        font-size="16" letter-spacing="5"
        fill="#787870">OPUS &#183; MMXXVI &#183; tryopusai.com</text>
</svg>
