<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="The name and the mark — the OPUS armillary sphere">
  <rect width="1080" height="1080" fill="#000"/>
  <g stroke="#787870" stroke-width="1" fill="none" opacity="0.55">
    <path d="M40 40 L40 90 M40 40 L90 40"/>
    <path d="M1040 40 L1040 90 M1040 40 L990 40"/>
    <path d="M40 1040 L40 990 M40 1040 L90 1040"/>
    <path d="M1040 1040 L1040 990 M1040 1040 L990 1040"/>
  </g>
  <g transform="translate(540,540)" stroke="#F2EFE6" stroke-width="1.4" fill="none">
    <!-- Outer sphere -->
    <circle cx="0" cy="0" r="340"/>
    <!-- Meridians (vertical ellipses rotated) -->
    <ellipse cx="0" cy="0" rx="340" ry="115" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="115" ry="340" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="240" ry="240" stroke-width="0.6" opacity="0.4"/>
    <ellipse cx="0" cy="0" rx="180" ry="240" stroke-width="0.6" opacity="0.4" transform="rotate(45)"/>
    <ellipse cx="0" cy="0" rx="180" ry="240" stroke-width="0.6" opacity="0.4" transform="rotate(-45)"/>
    <!-- Equatorial band -->
    <ellipse cx="0" cy="0" rx="340" ry="14" fill="none" stroke-width="0.8" opacity="0.7"/>
    <!-- Beaded equator -->
    <g fill="#F2EFE6" stroke="none">
      <circle cx="340" cy="0" r="5"/>
      <circle cx="306" cy="0" r="4"/>
      <circle cx="269" cy="0" r="4"/>
      <circle cx="-340" cy="0" r="5"/>
      <circle cx="-306" cy="0" r="4"/>
      <circle cx="-269" cy="0" r="4"/>
      <circle cx="294" cy="-5" r="3" opacity="0.5"/>
      <circle cx="-294" cy="-5" r="3" opacity="0.5"/>
    </g>
    <!-- Central pole -->
    <line x1="0" y1="-340" x2="0" y2="340"/>
    <!-- Inner eye -->
    <circle cx="0" cy="0" r="60" stroke-width="1"/>
    <circle cx="0" cy="0" r="32" stroke="#D4AF7A" stroke-width="1"/>
    <circle cx="0" cy="0" r="14" fill="#D4AF7A" stroke="none"/>
    <!-- Top finial -->
    <line x1="0" y1="-340" x2="0" y2="-380" stroke-width="1.2"/>
    <circle cx="0" cy="-388" r="7" fill="#F2EFE6" stroke="none"/>
    <!-- Base plate -->
    <ellipse cx="0" cy="395" rx="60" ry="9" stroke-width="1"/>
    <rect x="-40" y="396" width="80" height="6" stroke="#F2EFE6" stroke-width="1" fill="none"/>
  </g>
</svg>
