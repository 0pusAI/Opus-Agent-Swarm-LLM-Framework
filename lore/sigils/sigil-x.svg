<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="The site is a grimoire — an open book with the OPUS sphere illuminating the right page">
  <rect width="1080" height="1080" fill="#000"/>
  <g stroke="#787870" stroke-width="1" fill="none" opacity="0.55">
    <path d="M40 40 L40 90 M40 40 L90 40"/>
    <path d="M1040 40 L1040 90 M1040 40 L990 40"/>
    <path d="M40 1040 L40 990 M40 1040 L90 1040"/>
    <path d="M1040 1040 L1040 990 M1040 1040 L990 1040"/>
  </g>
  <g transform="translate(540,540)" stroke="#F2EFE6" stroke-width="1.4" fill="none">
    <!-- Open book outline (V-shape with pages) -->
    <path d="M -380,-280 Q -360,-260 -20,-200 L -20,260 Q -360,200 -380,220 Z"/>
    <path d="M  380,-280 Q  360,-260  20,-200 L  20,260 Q  360,200  380,220 Z"/>
    <!-- Page texture lines on left page -->
    <g opacity="0.4" stroke-width="0.8">
      <line x1="-340" y1="-220" x2="-60" y2="-170"/>
      <line x1="-340" y1="-180" x2="-60" y2="-130"/>
      <line x1="-340" y1="-140" x2="-60" y2="-90"/>
      <line x1="-340" y1="-100" x2="-60" y2="-50"/>
      <line x1="-340" y1="-60" x2="-60" y2="-10"/>
      <line x1="-340" y1="-20" x2="-60" y2="30"/>
      <line x1="-340" y1="20" x2="-60" y2="70"/>
      <line x1="-340" y1="60" x2="-60" y2="110"/>
      <line x1="-340" y1="100" x2="-60" y2="150"/>
      <line x1="-340" y1="140" x2="-60" y2="190"/>
    </g>
    <!-- Illuminated initial on the left page (Roman O) -->
    <g transform="translate(-260,-130)">
      <ellipse cx="0" cy="0" rx="50" ry="60" stroke="#D4AF7A" stroke-width="2"/>
      <ellipse cx="0" cy="0" rx="28" ry="38" stroke="#D4AF7A" stroke-width="1" opacity="0.7"/>
    </g>
    <!-- Sphere on the right page -->
    <g transform="translate(220,0)">
      <circle cx="0" cy="0" r="120"/>
      <ellipse cx="0" cy="0" rx="120" ry="40" opacity="0.65"/>
      <ellipse cx="0" cy="0" rx="40" ry="120" opacity="0.65"/>
      <line x1="0" y1="-120" x2="0" y2="120" opacity="0.45"/>
      <line x1="-120" y1="0" x2="120" y2="0" opacity="0.45"/>
      <circle cx="0" cy="0" r="22" stroke="#D4AF7A"/>
      <circle cx="0" cy="0" r="9" fill="#D4AF7A" stroke="none"/>
    </g>
    <!-- Decorative corner flourishes on each page -->
    <g opacity="0.6">
      <path d="M-370,-260 Q-340,-250 -340,-230" stroke-width="0.8"/>
      <path d="M-370,200 Q-340,190 -340,170" stroke-width="0.8"/>
      <path d="M370,-260 Q340,-250 340,-230" stroke-width="0.8"/>
      <path d="M370,200 Q340,190 340,170" stroke-width="0.8"/>
    </g>
    <!-- Center spine -->
    <line x1="0" y1="-230" x2="0" y2="245" opacity="0.5"/>
  </g>
</svg>
