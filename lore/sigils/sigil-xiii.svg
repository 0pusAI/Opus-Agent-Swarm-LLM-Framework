<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="The sphere in Three.js — a detailed armillary sphere with particle dust around it">
  <rect width="1080" height="1080" fill="#000"/>
  <g stroke="#787870" stroke-width="1" fill="none" opacity="0.55">
    <path d="M40 40 L40 90 M40 40 L90 40"/>
    <path d="M1040 40 L1040 90 M1040 40 L990 40"/>
    <path d="M40 1040 L40 990 M40 1040 L90 1040"/>
    <path d="M1040 1040 L1040 990 M1040 1040 L990 1040"/>
  </g>
  <!-- Scattered particle dust -->
  <g fill="#F2EFE6" stroke="none">
    <circle cx="160" cy="200" r="2"/>
    <circle cx="220" cy="340" r="1.5"/>
    <circle cx="130" cy="500" r="2"/>
    <circle cx="180" cy="700" r="1.5"/>
    <circle cx="260" cy="820" r="2"/>
    <circle cx="900" cy="220" r="2"/>
    <circle cx="850" cy="370" r="1.5"/>
    <circle cx="950" cy="510" r="2"/>
    <circle cx="900" cy="690" r="1.5"/>
    <circle cx="820" cy="830" r="2"/>
    <circle cx="540" cy="140" r="1.5" opacity="0.7"/>
    <circle cx="540" cy="940" r="1.5" opacity="0.7"/>
  </g>
  <g fill="#D4AF7A" stroke="none" opacity="0.7">
    <circle cx="280" cy="280" r="1.5"/>
    <circle cx="800" cy="780" r="1.5"/>
    <circle cx="320" cy="780" r="1.5"/>
    <circle cx="780" cy="280" r="1.5"/>
  </g>
  <!-- The full armillary sphere — detailed -->
  <g transform="translate(540,540)" stroke="#F2EFE6" stroke-width="1.4" fill="none">
    <circle cx="0" cy="0" r="320"/>
    <!-- 6 meridian ellipses at evenly-spaced rotations -->
    <ellipse cx="0" cy="0" rx="115" ry="320"/>
    <ellipse cx="0" cy="0" rx="115" ry="320" transform="rotate(30)" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="115" ry="320" transform="rotate(60)" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="115" ry="320" transform="rotate(90)"/>
    <ellipse cx="0" cy="0" rx="115" ry="320" transform="rotate(120)" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="115" ry="320" transform="rotate(150)" opacity="0.5"/>
    <!-- 3 latitude rings -->
    <ellipse cx="0" cy="-110" rx="280" ry="36" opacity="0.45"/>
    <ellipse cx="0" cy="0" rx="320" ry="14" stroke-width="1.1" opacity="0.8"/>
    <ellipse cx="0" cy="110" rx="280" ry="36" opacity="0.45"/>
    <!-- Beaded equator -->
    <g fill="#F2EFE6" stroke="none">
      <circle cx="320" cy="0" r="5"/>
      <circle cx="-320" cy="0" r="5"/>
      <circle cx="287" cy="0" r="3.5"/>
      <circle cx="-287" cy="0" r="3.5"/>
      <circle cx="255" cy="0" r="3"/>
      <circle cx="-255" cy="0" r="3"/>
    </g>
    <line x1="0" y1="-320" x2="0" y2="320"/>
    <!-- Central glowing eye -->
    <circle cx="0" cy="0" r="60" opacity="0.45"/>
    <circle cx="0" cy="0" r="32" stroke="#D4AF7A"/>
    <circle cx="0" cy="0" r="14" fill="#D4AF7A" stroke="none"/>
    <circle cx="0" cy="0" r="86" stroke="#D4AF7A" opacity="0.18" stroke-width="0.6"/>
    <!-- Finial -->
    <line x1="0" y1="-320" x2="0" y2="-360"/>
    <circle cx="0" cy="-368" r="6" fill="#F2EFE6" stroke="none"/>
    <!-- Base -->
    <ellipse cx="0" cy="370" rx="55" ry="8"/>
  </g>
</svg>
